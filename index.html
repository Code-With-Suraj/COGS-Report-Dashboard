<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Title -->
  <title>COGS Report Dashboard</title>

  <!-- Favicon (change URL to your logo) -->
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
    }

    /* ===== Modern Loader ===== */
    .loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
    }

    /* Animated Gradient Circle */
    .spinner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: conic-gradient(#4CAF50, #00c6ff, #4CAF50);
      animation: rotate 1.2s linear infinite;
      mask: radial-gradient(farthest-side, transparent 60%, black 61%);
      -webkit-mask: radial-gradient(farthest-side, transparent 60%, black 61%);
      margin-bottom: 20px;
    }

    @keyframes rotate {
      to {
        transform: rotate(360deg);
      }
    }

    /* Loading Text */
    .loader-text {
      font-size: 16px;
      color: #555;
      letter-spacing: 0.5px;
    }

    /* ===== Iframe ===== */
    .iframe-container {
      width: 100%;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

  </style>
</head>

<body>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Loading COGS Dashboard...</div>
  </div>

  <!-- Iframe -->
  <div class="iframe-container">
    <iframe 
      src="https://script.google.com/macros/s/AKfycbzXoZQEtLzrU8_RRPJ3o3vSpcg6NHjuHRzbC2zTqQfLUwbL1o9pY1aM1lWQnH5k6tKa/exec"
      onload="hideLoader()"
      loading="lazy">
    </iframe>
  </div>

  <script>
    function hideLoader() {
      const loader = document.getElementById("loader");
      loader.style.opacity = "0";
      loader.style.transition = "opacity 0.4s ease";

      setTimeout(() => {
        loader.style.display = "none";
      }, 400);
    }
  </script>

</body>
</html>
